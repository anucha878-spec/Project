              - paragraph [ref=e188]:
                - text: Defect พบจาก UAT — CR#1 "After Golive Lot1" / Test Case TC-CR1-011 (Estimate, Layer differentiation) ภายใต้ CR#6 (
                - link "#63684" [ref=e189] [cursor=pointer]:
                  - /url: /issues/63684
                - text: "ข้อ 8: เงื่อนไขการคำนวณสมาชิก GIB Level 2 และ 3)"
              - heading "================================================================= ■ SUMMARY" [level=1] [ref=e190]:
                - text: =================================================================
                - text: ■ SUMMARY
              - paragraph [ref=e191]: เครื่องคำนวณ RI Premium (Estimate) ไม่ apply percent_re แยกตาม Layer (GIB band) ของ treaty — นำเบี้ยของสมาชิกทุกชั้นมารวมไว้ที่ L1 ทั้งหมด แล้วใช้ % cede ของ L1 (15%) เพียงชั้นเดียว ทำให้สมาชิกที่ทุนประกัน (Sum Assured) ตกชั้น L2 (ต้อง cede 100%) และ L3 (ต้อง cede 0%) ไม่ถูกคำนวณตามเงื่อนไข treaty ที่กำหนดไว้
              - heading "================================================================= ■ ENVIRONMENT" [level=1] [ref=e192]:
                - text: =================================================================
                - text: ■ ENVIRONMENT
              - list [ref=e193]:
                - listitem [ref=e194]: "Database : groupri @ 10.14.8.58 (PostgreSQL 18)"
                - listitem [ref=e195]: "Treaty : GIB_Grp_Direct_EB (cf_rig_treaty_id = 2, method QSSUR, ri_com_rate 50%)"
                - listitem [ref=e196]: "Policy : GL5505 | Closing period: 202604 | Policy Year 2 (Non-Unit Rate, rate_flag=1)"
                - listitem [ref=e197]: "Estimate run : tx_rig_est_hd.rig_est_hd_id = 439 (status SUCCESS, created 2026-05-26 by QA)"
                - listitem [ref=e198]: "Test data : cer_no 00701-00708 (created_by = 'QA_TC_CR1_010_018')"
              - heading "================================================================= ■ TREATY CONDITION ที่ถูกต้อง (cf_rig_treaty_cond_dt, cond_hd_id = 2)" [level=1] [ref=e199]:
                - text: =================================================================
                - text: ■ TREATY CONDITION ที่ถูกต้อง (cf_rig_treaty_cond_dt, cond_hd_id = 2)
              - generic [ref=e200]: Layer Sum Assured range percent_re (cede) L1 0 - 5,000,000 15% L2 5,000,000.01 - 20,000,000 100% L3 > 20,000,000 0% (เกิน capacity ไม่รับต่อ)
              - paragraph [ref=e201]: "TEST MEMBERS (ฝั่ง Life) และชั้นที่ควรตก:"
              - generic [ref=e202]: cer SA (Life) expected layer 00701 4,000,000 L1 00702 12,000,000 L2 00703 22,000,000 L3 00708 5,000,000 L1
              - heading "================================================================= ■ STEPS TO REPRODUCE" [level=1] [ref=e203]:
                - text: =================================================================
                - text: ■ STEPS TO REPRODUCE
              - list [ref=e204]:
                - listitem [ref=e205]:
                  - text: โหลด test member 00701-00708 เข้า Landing (tx_rig_landing_cert_inforce) ของ policy GL5505 PY2
                  - list [ref=e206]:
                    - listitem [ref=e207]: 00702 ทุน Life 12,000,000 (ต้องตก L2), 00703 ทุน Life 22,000,000 (ต้องตก L3)
                - listitem [ref=e208]: รัน Estimate (snapshot -> staging -> RI calc) ของ treaty GIB_Grp_Direct_EB period 202604
                - listitem [ref=e209]: ตรวจ RI Premium รายชั้นที่ตาราง tx_rig_est_policy_dt ของ GL5505
              - heading "================================================================= ■ EXPECTED vs ACTUAL (RI Premium Life — tx_rig_est_policy_dt, hd = 439)" [level=1] [ref=e210]:
                - text: =================================================================
                - text: ■ EXPECTED vs ACTUAL (RI Premium Life — tx_rig_est_policy_dt, hd = 439)
              - paragraph [ref=e211]:
                - text: Expected = เบี้ย layer จาก staging x percent_re
                - text: L1 = 654,085 x 15% = 98,112.75
                - text: L2 = 14,400 x 100% = 14,400.00
                - text: L3 = 26,400 x 0% = 0.00
              - generic [ref=e212]: Layer Expected Actual Diff L1 98,112.75 104,232.75 +6,120.00 L2 14,400.00 0.00 -14,400.00 L3 0.00 0.00 0.00 Total 112,512.75 104,232.75 -8,280.00
              - paragraph [ref=e213]:
                - text: ค่า Actual L1 = 104,232.75 = (654,085 + 14,400 + 26,400) x 15% = 694,885 (เบี้ย Life รวมทุกชั้น) x 15%
                - text: => ยืนยันว่า engine นำเบี้ยรวมทุกชั้นมาคูณ % ของ L1 ชั้นเดียว
              - heading "================================================================= ■ ROOT CAUSE (วิเคราะห์)" [level=1] [ref=e214]:
