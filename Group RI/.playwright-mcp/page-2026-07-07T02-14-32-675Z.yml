                  - listitem [ref=e341]: "implied base (÷ cede): L1 = 927,954.00 / L2 = 46,080.00 → ไม่ตรงกับฐานใดๆ ที่ยังเหลือในระบบ: เบี้ยจริง 79,292 / เบี้ยสะสม sum_life_prem 11,940,652.80 / SA×age-rate / SA×layer-rate ก็ไม่ตรงสักตัว"
                  - listitem [ref=e342]: "ตัด \"ใช้ตารางอัตราอายุ\" ทิ้งได้: tx_est_snap_prem_rate age 68 ชาย = life 2.0 / acc 3.5 แต่ค่าที่ implied = life 2.304 / acc 0.756 (acc < life กลับด้านกับ rate table)"
                - paragraph [ref=e343]:
                  - emphasis [ref=e344]: "4) อัตราส่วน life:acc ภายใน layer ยังถูก (rate ไม่ได้สลับ) แต่ขนาดถูก inflate ด้วยตัวคูณแปลกปลอมที่ไม่คงที่:"
