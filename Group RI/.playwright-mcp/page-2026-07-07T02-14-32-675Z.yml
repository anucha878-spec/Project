                    - text: ri_prem_life L1 ที่ออกมา =
                    - emphasis [ref=e333]: 139,193.10
                  - listitem [ref=e334]:
                    - text: เบี้ย life รวม "ทั้ง policy" (Σ cert.life_prem ทุก 360 ราย จาก tx_est_snap_cert_inforce) =
                    - emphasis [ref=e335]: 79,292.30
                  - listitem [ref=e336]: → ri_prem ของ layer เดียว มากกว่าเบี้ยจริงทั้ง policy 1.76 เท่า ทั้งที่ cede ≤ 100% เป็นไปไม่ได้
                - paragraph [ref=e337]:
                  - emphasis [ref=e338]: "3) base ที่ engine ใช้จริง ≠ prem_layer.life_prem:"
                - list [ref=e339]:
