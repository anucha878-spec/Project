                - text: ■ ROOT CAUSE (วิเคราะห์)
              - list [ref=e215]:
                - listitem [ref=e216]: Step 2 (Premium Rate ระดับสมาชิก) ถูกต้อง — prem = SA/1000 x rate (Life 1.2, Acc 3.0)
                - listitem [ref=e217]:
                  - text: "Step 3 (staging tx_stg_est_prem_layer) แยกชั้นถูกต้อง:"
                  - text: L1 life_prem 654,085 / L2 14,400 / L3 26,400 (และ L2 life_insure=12,000,000 = 00702, L3=22,000,000 = 00703)
                - listitem [ref=e218]:
                  - text: "Step 4 (tx_rig_est_policy_dt — RI cede) ยุบทุก member กลับเป็น L1:"
                  - text: L1 = 104,232.75, L2 = 0, L3 = 0
                - listitem [ref=e219]:
                  - text: "สรุป: ข้อมูล layer mapping ที่ถูกต้องจาก staging (Step 3) ไม่ถูกส่งต่อเข้าการคิด cede ราย layer (Step 4)"
                  - text: engine ใช้ percent_re ของ L1 (15%) กับสมาชิกทุกคนแทนที่จะใช้ % ตามชั้นจริง
              - heading "================================================================= ■ IMPACT" [level=1] [ref=e220]:
                - text: =================================================================
                - text: ■ IMPACT
              - list [ref=e221]:
                - listitem [ref=e222]:
                  - text: RI Premium Life ของ GL5505 ขาดไป net 8,280.00
                  - list [ref=e223]:
                    - listitem [ref=e224]: "member 00702 (L2): ควร cede 100% = 14,400 แต่ถูกคิดแค่ 15% = 2,160 (ขาด 12,240)"
                    - listitem [ref=e225]: "member 00703 (L3): ควร cede 0% = 0 แต่ถูก cede 15% = 3,960 (เกิน 3,960 — ไม่ควรรับต่อเลย)"
                - listitem [ref=e226]: RI Commission (50%) และรายงาน BDR (tx_rig_est_bdr) คำนวณผิดตามยอดเบี้ยที่ผิด
                - listitem [ref=e227]: ฝั่ง Accident มี logic เดียวกัน — แต่ใน run นี้สมาชิก acc ทุกคนตก L1 อยู่แล้วจึงยังไม่เห็นส่วนต่าง
                - listitem [ref=e228]: กระทบทุก policy/treaty ที่มีสมาชิกตก GIB Level 2/3 (ตรงกับขอบเขต CR#6 ข้อ 8)
              - heading "================================================================= ■ EVIDENCE (SQL ตรวจสอบ — groupri@10.14.8.58)" [level=1] [ref=e229]:
                - text: =================================================================
                - text: ■ EVIDENCE (SQL ตรวจสอบ — groupri@10.14.8.58)
