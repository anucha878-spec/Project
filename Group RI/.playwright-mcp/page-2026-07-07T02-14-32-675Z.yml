                - paragraph [ref=e327]:
                  - emphasis [ref=e328]: "1) สูตรที่ถูกต้อง (พิสูจน์จาก single-layer policy 3 ตัวใน run เดียวกัน ตรงเป๊ะถึงสตางค์):"
                  - text: "@ri_prem_life = prem_layer.life_prem × percent_re@ (เช่น GH5327: 2,704,053.00 × 15% = 405,607.95)"
                - paragraph [ref=e329]:
                  - emphasis [ref=e330]: "2) ค่า L1 ของ GL5557 \"เป็นไปไม่ได้\" ทางคณิตศาสตร์ = หลักฐานชี้ขาดว่าเป็น defect (ไม่ใช่ปัดเศษ/proration):"
