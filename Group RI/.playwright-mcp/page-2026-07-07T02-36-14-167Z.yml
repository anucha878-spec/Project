                - listitem [ref=e230]: ฝั่ง Accident มี logic เดียวกัน — แต่ใน run นี้สมาชิก acc ทุกคนตก L1 อยู่แล้วจึงยังไม่เห็นส่วนต่าง
                - listitem [ref=e231]: กระทบทุก policy/treaty ที่มีสมาชิกตก GIB Level 2/3 (ตรงกับขอบเขต CR#6 ข้อ 8)
