                  - text: โหลด test member 00701-00708 เข้า Landing (tx_rig_landing_cert_inforce) ของ policy GL5505 PY2
                  - list [ref=e209]:
                    - listitem [ref=e210]: 00702 ทุน Life 12,000,000 (ต้องตก L2), 00703 ทุน Life 22,000,000 (ต้องตก L3)
                - listitem [ref=e211]: รัน Estimate (snapshot -> staging -> RI calc) ของ treaty GIB_Grp_Direct_EB period 202604
                - listitem [ref=e212]: ตรวจ RI Premium รายชั้นที่ตาราง tx_rig_est_policy_dt ของ GL5505
              - heading "================================================================= ■ EXPECTED vs ACTUAL (RI Premium Life — tx_rig_est_policy_dt, hd = 439)" [level=1] [ref=e213]:
                - text: =================================================================
                - text: ■ EXPECTED vs ACTUAL (RI Premium Life — tx_rig_est_policy_dt, hd = 439)
              - paragraph [ref=e214]:
                - text: Expected = เบี้ย layer จาก staging x percent_re
                - text: L1 = 654,085 x 15% = 98,112.75
                - text: L2 = 14,400 x 100% = 14,400.00
                - text: L3 = 26,400 x 0% = 0.00
              - generic [ref=e215]: Layer Expected Actual Diff L1 98,112.75 104,232.75 +6,120.00 L2 14,400.00 0.00 -14,400.00 L3 0.00 0.00 0.00 Total 112,512.75 104,232.75 -8,280.00
              - paragraph [ref=e216]:
                - text: ค่า Actual L1 = 104,232.75 = (654,085 + 14,400 + 26,400) x 15% = 694,885 (เบี้ย Life รวมทุกชั้น) x 15%
                - text: => ยืนยันว่า engine นำเบี้ยรวมทุกชั้นมาคูณ % ของ L1 ชั้นเดียว
