                - text: "ข้อ 8: เงื่อนไขการคำนวณสมาชิก GIB Level 2 และ 3)"
              - heading "================================================================= ■ SUMMARY" [level=1] [ref=e193]:
                - text: =================================================================
                - text: ■ SUMMARY
              - paragraph [ref=e194]: เครื่องคำนวณ RI Premium (Estimate) ไม่ apply percent_re แยกตาม Layer (GIB band) ของ treaty — นำเบี้ยของสมาชิกทุกชั้นมารวมไว้ที่ L1 ทั้งหมด แล้วใช้ % cede ของ L1 (15%) เพียงชั้นเดียว ทำให้สมาชิกที่ทุนประกัน (Sum Assured) ตกชั้น L2 (ต้อง cede 100%) และ L3 (ต้อง cede 0%) ไม่ถูกคำนวณตามเงื่อนไข treaty ที่กำหนดไว้
              - heading "================================================================= ■ ENVIRONMENT" [level=1] [ref=e195]:
                - text: =================================================================
                - text: ■ ENVIRONMENT
              - list [ref=e196]:
                - listitem [ref=e197]: "Database : groupri @ 10.14.8.58 (PostgreSQL 18)"
                - listitem [ref=e198]: "Treaty : GIB_Grp_Direct_EB (cf_rig_treaty_id = 2, method QSSUR, ri_com_rate 50%)"
                - listitem [ref=e199]: "Policy : GL5505 | Closing period: 202604 | Policy Year 2 (Non-Unit Rate, rate_flag=1)"
                - listitem [ref=e200]: "Estimate run : tx_rig_est_hd.rig_est_hd_id = 439 (status SUCCESS, created 2026-05-26 by QA)"
                - listitem [ref=e201]: "Test data : cer_no 00701-00708 (created_by = 'QA_TC_CR1_010_018')"
              - heading "================================================================= ■ TREATY CONDITION ที่ถูกต้อง (cf_rig_treaty_cond_dt, cond_hd_id = 2)" [level=1] [ref=e202]:
                - text: =================================================================
                - text: ■ TREATY CONDITION ที่ถูกต้อง (cf_rig_treaty_cond_dt, cond_hd_id = 2)
              - generic [ref=e203]: Layer Sum Assured range percent_re (cede) L1 0 - 5,000,000 15% L2 5,000,000.01 - 20,000,000 100% L3 > 20,000,000 0% (เกิน capacity ไม่รับต่อ)
              - paragraph [ref=e204]: "TEST MEMBERS (ฝั่ง Life) และชั้นที่ควรตก:"
              - generic [ref=e205]: cer SA (Life) expected layer 00701 4,000,000 L1 00702 12,000,000 L2 00703 22,000,000 L3 00708 5,000,000 L1
